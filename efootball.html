<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>E-Football Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="efootball.css">
</head>
<body>
    <header class="ef-header">
        <div class="container row">
            <div class="left">
                <button id="efMenuBtn" class="menu-btn" type="button" aria-label="Open menu">&#9776;</button>
                <div class="brand">E-Football</div>
            </div>
            <div class="actions">
                <a href="index.html" class="btn btn-outline">Back To Main Site</a>
                <button id="efOpenRegisterBtn" class="btn btn-outline">Register / Login</button>
                <button id="efLogoutBtn" class="btn btn-outline" style="display:none">Logout</button>
            </div>
        </div>
        <nav id="efMenuPanel" class="menu-panel">
            <button type="button" class="menu-link" data-target="efFixturesSection">Fixtures</button>
            <button type="button" class="menu-link" data-target="efResultsSection">Results</button>
            <button type="button" class="menu-link" data-target="efStandingsSection">Standings</button>
            <button type="button" class="menu-link" data-target="efRegisterCard">Register / Login</button>
        </nav>
    </header>

    <main class="container">
        <section id="efRegisterCard" class="card" style="display:none">
            <h2>E-Football Registration</h2>
            <p class="muted">Player registration fee: <strong>Ksh 200</strong> per league. <strong>Friendly League is free.</strong></p>
            <div class="grid">
                <input id="efPlayerName" placeholder="Player Name" />
                <input id="efPhone" placeholder="Phone Number" />
                <input id="efMpesaRef" placeholder="M-Pesa Reference" />
                <input id="efEmail" placeholder="Email" />
                <input id="efPassword" type="password" placeholder="Password" />
                <select id="efLeagueSelect"></select>
            </div>
            <div class="btns">
                <button id="efRegisterBtn" class="btn">Register Player</button>
                <button id="efLoginBtn" class="btn btn-primary">Login</button>
            </div>
        </section>

        <section id="efAccountCard" class="card" style="display:none">
            <h3>My Account</h3>
            <div id="efAccountInfo" class="muted"></div>
        </section>

        <section id="efLeagueCard" class="card">
            <h3>Leagues</h3>
            <div class="row-wrap">
                <label for="efLeagueView"><strong>League:</strong></label>
                <select id="efLeagueView"></select>
            </div>
        </section>

        <section id="efFixturesSection" class="card">
            <h3>Fixtures</h3>
            <div class="row-wrap" style="margin-bottom:8px">
                <label for="efFixturesLeagueView"><strong>League:</strong></label>
                <select id="efFixturesLeagueView"></select>
            </div>
            <ul id="efFixturesList" class="fixtures-list"></ul>
        </section>

        <section id="efResultsSection" class="card" style="display:none">
            <h3>Results</h3>
            <div class="row-wrap" style="margin-bottom:8px">
                <label for="efResultsLeagueView"><strong>League:</strong></label>
                <select id="efResultsLeagueView"></select>
            </div>
            <ul id="efResultsList" class="fixtures-list"></ul>
        </section>

        <section id="efStandingsSection" class="card">
            <h3>Standings</h3>
            <div class="table-wrap">
                <table class="standings">
                    <thead>
                        <tr><th>#</th><th>Player</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr>
                    </thead>
                    <tbody id="efStandingsBody"></tbody>
                </table>
            </div>
        </section>

        <section id="efMyMatchesCard" class="card" style="display:none">
            <h3>My Matches (Submit Result)</h3>
            <table class="table">
                <thead>
                    <tr><th>Fixture</th><th>Score</th><th>Action</th></tr>
                </thead>
                <tbody id="efMyMatchesBody"></tbody>
            </table>
        </section>
    </main>

    <script type="module" src="firebase-bridge.js"></script>
    <script type="module" src="efootball.js"></script>
</body>
</html>
