<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Umma League</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/Ps25PFtj/leagues-logo.png">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#2b0b4a">
    <meta http-equiv="refresh" content="0; url=index.html#register" />
    <script>
        const target = new URL("index.html", window.location.href);
        if(window.location.hash){
            target.hash = window.location.hash;
        } else {
            target.hash = "register";
        }
        window.location.replace(target.toString());
    </script>
</head>
<body>
    <p>Redirecting to <a href="index.html#register">index.html#register</a>...</p>
</body>
</html>
